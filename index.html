<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>正在打开 WorkBuddy...</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: #fff;
  }
  .container {
    text-align: center; padding: 40px;
    background: rgba(255,255,255,0.15);
    border-radius: 20px;
    backdrop-filter: blur(10px);
    max-width: 420px;
  }
  .icon { font-size: 64px; margin-bottom: 20px; }
  h1 { font-size: 22px; margin-bottom: 12px; }
  p { font-size: 15px; opacity: 0.9; line-height: 1.6; }
  .hint { margin-top: 24px; font-size: 13px; opacity: 0.7; }
  .btn {
    display: inline-block; margin-top: 20px;
    padding: 12px 32px; border-radius: 8px;
    background: #fff; color: #764ba2;
    text-decoration: none; font-weight: 600; font-size: 16px;
    transition: transform 0.2s;
  }
  .btn:hover { transform: scale(1.05); }
  .spinner {
    width: 32px; height: 32px; margin: 16px auto;
    border: 3px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .copy-box {
    margin-top: 20px; padding: 12px 16px;
    background: rgba(255,255,255,0.2); border-radius: 10px;
    cursor: pointer; transition: background 0.2s;
  }
  .copy-box:hover { background: rgba(255,255,255,0.3); }
  .copy-box code { font-size: 16px; font-weight: 600; }
  .copy-tip { font-size: 12px; opacity: 0.7; margin-top: 6px; }
  .success { color: #4ade80; font-weight: 600; }
</style>
</head>
<body>
<div class="container">
  <div class="icon">🤖</div>
  <h1>正在打开 WorkBuddy...</h1>
  <div class="spinner" id="spinner"></div>
  <p id="status">正在跳转，请稍候</p>

  <div class="copy-box" id="copyBox" style="display:none" onclick="copyText()">
    <code>帮我回复AiSee</code>
    <div class="copy-tip" id="copyTip">👆 点击复制指令，粘贴到 WorkBuddy 对话框</div>
  </div>

  <a class="btn" id="retryBtn" style="display:none" href="workbuddy://">手动打开 WorkBuddy</a>

  <p class="hint">打开后在对话框发送「帮我回复AiSee」即可开始处理</p>
</div>

<script>
  // 自动尝试打开 workbuddy://
  function tryOpen() {
    window.location.href = 'workbuddy://';

    // 2秒后显示手动按钮和复制框（以防自动跳转没生效）
    setTimeout(function() {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('status').innerHTML = '如果 WorkBuddy 已打开，请复制下方指令 👇';
      document.getElementById('copyBox').style.display = 'block';
      document.getElementById('retryBtn').style.display = 'inline-block';
    }, 2000);
  }

  function copyText() {
    var text = '帮我回复AiSee';
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(function() {
        document.getElementById('copyTip').innerHTML = '<span class="success">✅ 已复制！去 WorkBuddy 粘贴发送吧</span>';
      });
    } else {
      var ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      document.getElementById('copyTip').innerHTML = '<span class="success">✅ 已复制！去 WorkBuddy 粘贴发送吧</span>';
    }
  }

  tryOpen();
</script>
</body>
</html>
